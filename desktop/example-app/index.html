<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Playwright AI Desktop Example</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        margin: 3rem;
        color: #1a1a2e;
        background: #fafafc;
      }
      h1 {
        font-size: 1.6rem;
      }
      button {
        font-size: 1rem;
        padding: 0.5rem 1rem;
        margin-top: 1rem;
        cursor: pointer;
      }
      button:focus-visible {
        outline: 2px solid #005fcc;
        outline-offset: 2px;
      }
      #status {
        margin-top: 1rem;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Playwright AI Desktop Example</h1>
      <p>A minimal Electron window driven by Playwright's <code>_electron</code> engine.</p>
      <button id="greet" type="button">Greet</button>
      <p id="status" role="status" aria-live="polite">Ready</p>
    </main>
    <script>
      const button = document.getElementById('greet');
      const status = document.getElementById('status');
      button.addEventListener('click', () => {
        status.textContent = 'Hello from Electron!';
      });
    </script>
  </body>
</html>
